    <rect x="700" y="488" width="40" height="40" rx="2" fill="rgba(220,38,38,0.4)"/><text x="720" y="513" fill="#1a1a2e" font-size="10" text-anchor="middle">-0.31</text>
    <rect x="742" y="488" width="40" height="40" rx="2" fill="rgba(220,38,38,0.3)"/><text x="762" y="513" fill="#1a1a2e" font-size="10" text-anchor="middle">-0.28</text>
    <rect x="784" y="488" width="40" height="40" rx="2" fill="#f0fdf4"/><text x="804" y="513" fill="#1a1a2e" font-size="10" text-anchor="middle">1.00</text>
    <rect x="826" y="488" width="40" height="40" rx="2" fill="rgba(220,38,38,0.15)"/><text x="846" y="513" fill="#1a1a2e" font-size="10" text-anchor="middle">-0.15</text>

    <rect x="700" y="532" width="40" height="40" rx="2" fill="rgba(29,100,165,0.4)"/><text x="720" y="557" fill="#1a1a2e" font-size="10" text-anchor="middle">0.41</text>
    <rect x="742" y="532" width="40" height="40" rx="2" fill="rgba(29,100,165,0.3)"/><text x="762" y="557" fill="#1a1a2e" font-size="10" text-anchor="middle">0.35</text>
    <rect x="784" y="532" width="40" height="40" rx="2" fill="rgba(220,38,38,0.15)"/><text x="804" y="557" fill="#1a1a2e" font-size="10" text-anchor="middle">-0.15</text>
