<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bgGrad)"/>
  <rect width="1200" height="680" fill="rgba(5,150,105,0.03)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="680" fill="url(#dots)"/>

  <!-- Main window -->
  <rect x="40" y="40" width="1120" height="600" rx="16" fill="#f5f5f3" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="40" y="40" width="1120" height="52" rx="16" fill="#1a1a2e"/>
  <rect x="40" y="76" width="1120" height="16" fill="#1a1a2e"/>
  <circle cx="76" cy="66" r="7" fill="#ff5f57"/>
  <circle cx="100" cy="66" r="7" fill="#febc2e"/>
  <circle cx="124" cy="66" r="7" fill="#28c840"/>
  <text x="160" y="71" fill="white" font-size="16" font-weight="800" letter-spacing="-0.5">Stat<tspan fill="#34d399">Lab</tspan></text>
  <text x="230" y="71" fill="rgba(255,255,255,0.35)" font-size="11">Statistik Riset, Lab &amp; Keuangan</text>
  <rect x="1020" y="56" width="50" height="22" rx="5" fill="#059669"/>
  <text x="1045" y="71" fill="white" font-size="11" font-weight="600" text-anchor="middle">Analisis</text>
  <rect x="1080" y="56" width="40" height="22" rx="5" fill="#dc2626"/>
